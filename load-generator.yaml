apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: autoscale-demo
spec:
  replicas: 0 # Start at 0, scale up during demo
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load-generator
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - "while true; do wget -q -O- http://sample-app-svc > /dev/null; done"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
